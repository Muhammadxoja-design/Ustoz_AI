version: '3.8'

services:
  # ----------------------------------------
  # PostgreSQL Database Service
  # ----------------------------------------
  db:
    image: postgres:15-alpine
    container_name: ustoz_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ustoz_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-SecurePostgresPass123!}
      POSTGRES_DB: ${POSTGRES_DB:-ustoz_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ustoz_admin} -d ${POSTGRES_DB:-ustoz_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------
  # Redis In-Memory Session Storage
  # ----------------------------------------
  redis:
    image: redis:7-alpine
    container_name: ustoz_redis
    restart: always
    # Secure Redis with a password to prevent unauthorized session hijacking
    command: redis-server --requirepass ${REDIS_PASSWORD:-SecureRedisPass123!}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-SecureRedisPass123!}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------
  # Main Node.js Application (Bot + Backend)
  # ----------------------------------------
  app:
    build: .
    container_name: ustoz_app
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      # Crucial Security: Only expose to 127.0.0.1 so the internet CANNOT bypass Nginx
      - "127.0.0.1:3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://${POSTGRES_USER:-ustoz_admin}:${POSTGRES_PASSWORD:-SecurePostgresPass123!}@db:5432/${POSTGRES_DB:-ustoz_db}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-SecureRedisPass123!}@redis:6379
      - BOT_TOKEN=${BOT_TOKEN}
      - ADMIN_TELEGRAM_IDS=${ADMIN_TELEGRAM_IDS}
      - WEBAPP_URL=${WEBAPP_URL}

volumes:
  postgres_data:
  redis_data:

# /etc/nginx/sites-available/ustoz
# Nginx Reverse Proxy & Security Configuration

# Define rate limiting zone (Anti-DDoS)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# -------------------------------------------------------------
# HTTP (Port 80) -> Secure HTTPS Redirection
# -------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name ustoz.yourdomain.com www.ustoz.yourdomain.com;

    # Allow Certbot Let's Encrypt validation to pass through
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Force redirect all other traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# -------------------------------------------------------------
# HTTPS (Port 443) Main Server Block
# -------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ustoz.yourdomain.com www.ustoz.yourdomain.com;

    # SSL Certificates (Injected automatically by Certbot)
    ssl_certificate /etc/letsencrypt/live/ustoz.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ustoz.yourdomain.com/privkey.pem;

    # ==========================================
    # SECURITY HEADERS (Zero-Trust Hardening)
    # ==========================================
    # Hide Nginx version from attackers
    server_tokens off;
    # Prevent Clickjacking (App cannot be embedded in malicious iframes)
    add_header X-Frame-Options "SAMEORIGIN" always;
    # Prevent MIME type sniffing
    add_header X-Content-Type-Options "nosniff" always;
    # Enforce strict HTTPS caching for 1 year
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ==========================================
    # ROUTING & PROXY
    # ==========================================
    
    # Static Assets & Frontend WebApp Routing
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        
        # WebSocket support (Crucial for Telegram WebApp real-time bridges)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        # Forward original client IP safely to the Node backend
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API Routes with Strict DDoS Rate Limiting
    location /api/ {
        # Limit attackers to 10 requests per second with a burst of 20
        limit_req zone=api_limit burst=20 nodelay;
        
        proxy_pass http://127.0.0.1:3000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
